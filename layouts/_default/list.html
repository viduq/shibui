{{ define "main" }}
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <table class="time-list">
        <tbody>
            {{ range .Pages }}
            <tr>
                <td class="time-list__date">{{- partial "date" .Date -}}</td>
                <td class="time-list__title"><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></td>
            </tr>
            {{ end }}
        </tbody>
    </table>
{{ end }}
